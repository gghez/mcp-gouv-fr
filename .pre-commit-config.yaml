# See https://pre-commit.com
# Uses Ruff from the project environment (`uv run` → same as `uv sync` / dev deps).
repos:
  - repo: local
    hooks:
      # Format first, then lint (Ruff recommendation).
      - id: ruff-format
        name: ruff format (uv)
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
        args: [--force-exclude]
      - id: ruff-check
        name: ruff check (uv)
        entry: uv run ruff check
        language: system
        types_or: [python, pyi]
        require_serial: true
        args: [--fix, --force-exclude]
